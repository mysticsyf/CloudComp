<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Auto-Equipped | Register</title>

  <link rel="stylesheet" href="/css/Forms.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

  <main class="register-wrapper">
    <section class="register-container">

      <a href="/" class="back-btn">
        <i class="bi bi-arrow-left"></i>
      </a>

      <h1 class="brand-name">Auto-Equipped</h1>

      <form id="registerForm" class="register-form">

        <div class="input-group">
          <label for="fullName">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName" 
            placeholder="Full Name" 
            required
          />
        </div>

        <div class="input-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Username" 
            required
          />
        </div>

        <div class="input-group">
          <label for="email">E-mail address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="E-mail address" 
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Password" 
            required
          />
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            placeholder="Confirm Password" 
            required
          />
        </div>

        <div class="role-row">
          <span>User Role:</span>

          <label class="role-option">
            <input type="radio" name="userRole" value="Vendor"  />
            <span>Vendor</span>
          </label>

          <label class="role-option">
            <input type="radio" name="userRole" value="Buyer"/>
            <span>Buyer</span>
          </label>
        </div>

        <div class="form-row">
          <label class="remember-label">
            <input type="checkbox" id="remember" name="remember" />
            Remember me
          </label>

          <a href="/login" class="login-link">Login Here</a>
        </div>

        <button type="submit" class="register-btn">Register</button>

        <p id="registerMessage" class="register-message"></p>

      </form>

    </section>
  </main>

  <script src="/js/register.js"></script>
</body>
</html>
