<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AutoEquip | Payment</title>

    <link rel="stylesheet" href="/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="layout">
        <div data-component="sidebarBuyer"></div>

        <div class="right-side">
            <div data-component="topbar"></div>

            <main class="main">

                <section class="payment-page">

                    <div class="payment-title">
                        <h1>Shopping Cart</h1>
                    </div>

                    <div class="cart-summary-box">

                        <div class="cart-row">
                            <div class="cart-item-info">
                                <span class="vendor-name">Vendor Name</span>
                                <span class="item-name">Item name</span>
                            </div>
                            <span class="item-price">RM 123</span>
                        </div>

                        <div class="cart-row">
                            <div class="cart-item-info">
                                <span class="vendor-name">Vendor Name</span>
                                <span class="item-name">Item name</span>
                            </div>
                            <span class="item-price">RM 123</span>
                        </div>

                        <div class="cart-row">
                            <div class="cart-item-info">
                                <span class="vendor-name">Vendor Name</span>
                                <span class="item-name">Item name</span>
                            </div>
                            <span class="item-price">RM 123</span>
                        </div>

                        <div class="cart-row">
                            <div class="cart-item-info">
                                <span class="vendor-name">Vendor Name</span>
                                <span class="item-name">Item name</span>
                            </div>
                            <span class="item-price">RM 123</span>
                        </div>

                        <div class="cart-row total-row">
                            <span>Total Ammount</span>
                            <span>RM 123</span>
                        </div>

                    </div>

                    <div class="payment-summary-box">

                        <div class="payment-row">
                            <span>Delivery Fee</span>
                            <span>RM 123</span>
                        </div>

                        <div class="payment-row">
                            <span>Tax</span>
                            <span>RM 123</span>
                        </div>

                        <div class="final-payment-row">
                            <span>Final Ammount</span>

                            <div class="final-right">
                                <span class="final-price">RM 123</span>

                                <button class="payment-btn">
                                    <i class="bi bi-cart"></i>
                                    Make payment
                                </button>
                            </div>
                        </div>

                    </div>

                </section>

            </main>
        </div>
    </div>

    <script src="/js/component.js"></script>
</body>
</html>
