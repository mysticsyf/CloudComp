<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoEquip | Track Orders</title>

    <link rel="stylesheet" href="/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="layout">
        <div data-component="sidebarBuyer"></div>

        <div class="right-side">
            <div data-component="topbar"></div>

            <main class="main track-main">
                <section class="track-page">

                    <div class="buyer-page-title">
                        <h1>Track Orders</h1>
                    </div>

                    <div class="track-order-card">
                        <div class="track-order-header">
                            <span>Order ID: #AE1002</span>
                            <span>Estimated Delivery: 3 - 5 days</span>
                        </div>

                        <div class="track-product-section">
                            <div class="track-product-img">ITEM PNG</div>

                            <div class="track-product-info">
                                <h2>Item name</h2>
                                <p>Vendor Name</p>
                                <p>Quantity: 2</p>
                                <p>Total: RM 246</p>
                            </div>
                        </div>

                        <div class="tracking-status">
                            <div class="track-step active">
                                <div class="circle">
                                    <i class="bi bi-check"></i>
                                </div>
                                <p>Paid</p>
                            </div>

                            <div class="track-line active-line"></div>

                            <div class="track-step active">
                                <div class="circle">
                                    <i class="bi bi-box-seam"></i>
                                </div>
                                <p>Packed</p>
                            </div>

                            <div class="track-line"></div>

                            <div class="track-step">
                                <div class="circle">
                                    <i class="bi bi-truck"></i>
                                </div>
                                <p>Shipping</p>
                            </div>

                            <div class="track-line"></div>

                            <div class="track-step">
                                <div class="circle">
                                    <i class="bi bi-house-door"></i>
                                </div>
                                <p>Delivered</p>
                            </div>
                        </div>

                        <div class="track-footer">
                            <button class="received-btn">
                                Order Received
                            </button>
                        </div>
                    </div>

                </section>
            </main>
        </div>
    </div>

    <script src="/js/component.js"></script>
</body>
</html>
