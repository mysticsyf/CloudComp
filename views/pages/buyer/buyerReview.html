<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoEquip | Review</title>

    <link rel="stylesheet" href="/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="layout">
        <div data-component="sidebarBuyer"></div>

        <div class="right-side">
            <div data-component="topbar"></div>

            <main class="main review-main">
                <section class="buyer-review-page">

                    <div class="buyer-page-title">
                        <h1>Review Order</h1>
                    </div>

                    <div class="review-order-box">
                        <div class="review-product-section">
                            <div class="review-product-img">ITEM PNG</div>

                            <div class="review-product-info">
                                <h2>Item name</h2>
                                <p>Vendor Name</p>
                                <p>Order ID: #AE1002</p>
                            </div>
                        </div>

                        <form class="review-form">
                            <div class="rating-row">
                                <label>Rating:</label>

                                <div class="star-rating">
                                    <i class="bi bi-star"></i>
                                    <i class="bi bi-star"></i>
                                    <i class="bi bi-star"></i>
                                    <i class="bi bi-star"></i>
                                    <i class="bi bi-star"></i>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="reviewText">Review Comment</label>
                                <textarea 
                                    id="reviewText" 
                                    name="reviewText" 
                                    placeholder="Write your review here..."
                                ></textarea>
                            </div>

                            <div class="review-btn-row">
                                <button type="submit" class="submit-review-btn">
                                    Submit Review
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="previous-review-box">
                        <h2>Previous Review</h2>

                        <div class="previous-review-card">
                            <div class="previous-review-header">
                                <span>Username</span>
                                <span>Ratings</span>
                            </div>

                            <p>
                                Product received in good condition. Delivery was smooth and the item quality is acceptable.
                            </p>
                        </div>
                    </div>

                </section>
            </main>
        </div>
    </div>

    <script src="/js/component.js"></script>
</body>
</html>
