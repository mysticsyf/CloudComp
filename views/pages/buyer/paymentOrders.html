<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoEquip | Payment Orders</title>

    <link rel="stylesheet" href="/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="layout">
        <div data-component="sidebar"></div>

        <div class="right-side">
            <div data-component="topbar"></div>

            <main class="main buyer-payment-main">
                <section class="buyer-payment-page">

                    <div class="buyer-page-title">
                        <h1>Payment Orders</h1>
                    </div>

                    <div class="payment-order-card">
                        <div class="payment-order-header">
                            <span>Order ID: #AE1001</span>
                            <span class="status pending">Pending Payment</span>
                        </div>

                        <div class="payment-order-body">
                            <div class="payment-product-img">ITEM PNG</div>

                            <div class="payment-product-info">
                                <h2>Item name</h2>
                                <p>Vendor Name</p>
                                <p>Quantity: 1</p>
                            </div>

                            <div class="payment-price">
                                <p>RM 123</p>
                            </div>
                        </div>

                        <div class="payment-order-footer">
                            <span>Total Amount: RM 123</span>

                            <a href="/payment" class="pay-now-btn">
                                <i class="bi bi-credit-card"></i>
                                Pay Now
                            </a>
                        </div>
                    </div>

                    <div class="payment-order-card">
                        <div class="payment-order-header">
                            <span>Order ID: #AE1002</span>
                            <span class="status paid">Paid</span>
                        </div>

                        <div class="payment-order-body">
                            <div class="payment-product-img">ITEM PNG</div>

                            <div class="payment-product-info">
                                <h2>Item name</h2>
                                <p>Vendor Name</p>
                                <p>Quantity: 2</p>
                            </div>

                            <div class="payment-price">
                                <p>RM 246</p>
                            </div>
                        </div>

                        <div class="payment-order-footer">
                            <span>Total Amount: RM 246</span>

                            <a href="/track-orders" class="track-btn">
                                <i class="bi bi-truck"></i>
                                Track Order
                            </a>
                        </div>
                    </div>

                </section>
            </main>
        </div>
    </div>

    <script src="/js/component.js"></script>
</body>
</html>
