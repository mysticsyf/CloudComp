<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoEquip | Welcome</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="layout">
        <div data-component="sidebar"></div>
        <div class="right-side">
            <div data-component="topbar"></div>

            <main class="main item-main">

                <section class="item-page">

                    <!-- Product Section -->
                    <div class="product-section">

                        <button class="arrow-btn left-arrow">
                            <i class="bi bi-arrow-left"></i>
                        </button>

                        <div class="product-image-box">
                            <div class="product-image-placeholder">
                                ITEM PNG
                            </div>
                        </div>

                        <button class="arrow-btn right-arrow">
                            <i class="bi bi-arrow-right"></i>
                        </button>

                        <div class="product-info">
                            <h1>Item name</h1>

                            <div class="product-stats">
                                <p>Rating</p>
                                <p>Sold amount</p>
                            </div>

                            <h2>RM 123</h2>

                            <p class="description-title">Description</p>

                            <div class="product-actions">
                                <button class="action-btn">
                                    <i class="bi bi-cart"></i>
                                    Add to cart
                                </button>

                                <button class="action-btn">
                                    <i class="bi bi-bag"></i>
                                    Buy Now
                                </button>
                            </div>
                        </div>

                    </div>

                    <!-- Vendor Section -->
                    <div class="vendor-section">
                        <div class="vendor-left">
                            <div class="vendor-profile-img">PFP</div>

                            <div class="vendor-info">
                                <h3>Vendor Name</h3>
                                <p>Rating</p>
                            </div>
                        </div>

                        <div class="vendor-tabs">
                            <a href="#">Products</a>
                            <a href="#">Reviews</a>
                        </div>
                    </div>

                    <!-- Reviews Section -->
                    <div class="reviews-section">
                        <h2>Reviews</h2>

                        <div class="review-card">
                            <div class="review-profile-img">PFP</div>

                            <div class="review-content">
                                <div class="review-header">
                                    <h4>Username</h4>
                                    <span>Ratings</span>
                                </div>

                                <p>
                                    comment
                                </p>
                            </div>
                        </div>
                    </div>

                </section>

            </main>
                
    <script src="/js/component.js"></script>
</body>
</html>
