<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product | Vendor</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/vendor.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="layout">
        <div data-component="sidebarVendor"></div>
        <main class="main">
            <!-- Topbar -->
            <div data-component="topbar"></div>
            <section class="content">
                <div class="add-product-content">

                    <div class="page-header">
                        <div class="header-left">
                            <a href="/products" class="back-link"><i class="bi bi-arrow-left"></i> Back to My Products</a>
                            <h2 class="page-title">ADD A NEW PRODUCT</h2>
                        </div>
                    </div>
                    <div class="card form-card">
                        <form id="addProductForm">
                            
                            <div class="form-grid">
                                <div class="form-column">
                                    <div class="form-group">
                                        <label>Product Name <span class="required">*</span></label>
                                        <input type="text" id="productName" placeholder="e.g. Premium Brake Pads" required />
                                    </div>

                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>Price ($) <span class="required">*</span></label>
                                            <input type="number" id="productPrice" step="0.01" min="0" placeholder="0.00" required />
                                        </div>
                                        <div class="form-group">
                                            <label>Stock Quantity <span class="required">*</span></label>
                                            <input type="number" id="productStock" min="0" placeholder="0" required />
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label>Description</label>
                                        <textarea id="productDescription" rows="5" placeholder="Enter product details and specifications..."></textarea>
                                    </div>
                                </div>

                                <!-- Right Column (Image Upload) -->
                                <div class="form-column">
                                    <div class="form-group">
                                        <label>Product Image</label>
                                        <input type="file" id="productImage" accept="image/*" />
                                    </div>

                                    <!-- Image Preview Box -->
                                    <div class="image-preview-container">
                                        <div class="image-preview" id="imagePreview">
                                            <i class="bi bi-image"></i>
                                            <span>Image Preview</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="btn-cancel" onclick="window.location.href='/products'">CANCEL</button>
                                <button type="submit" class="btn-save"><i class="bi bi-check2"></i> SAVE PRODUCT</button>
                            </div>

                        </form>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('addProductForm');
            const imageInput = document.getElementById('productImage');
            const imagePreview = document.getElementById('imagePreview');

            // Live image preview
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    imagePreview.innerHTML = `<img src="${url}" alt="Preview" style="width:100%; height:100%; object-fit:cover; border-radius:10px;">`;
                } else {
                    imagePreview.innerHTML = `<i class="bi bi-image"></i><span>Image Preview</span>`;
                }
            });

            // Form submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const vendorId = 1; // Replace with actual logged-in vendor ID
                
                const formData = new FormData();
                formData.append('vendor_id', vendorId);
                formData.append('name', document.getElementById('productName').value);
                formData.append('price', document.getElementById('productPrice').value);
                formData.append('stock', document.getElementById('productStock').value);
                formData.append('description', document.getElementById('productDescription').value);
                
                const fileField = document.getElementById('productImage');
                if (fileField.files[0]) {
                    formData.append('productImage', fileField.files[0]);
                }

                try {
                    // Send POST request to your API
                    const response = await fetch('/api/vendor/product', {
                        method: 'POST',
                        body: formData // Note: We do NOT set Content-Type header manually, the browser does it automatically for FormData
                    });

                    if (response.ok) {
                        alert('Product added successfully!');
                        window.location.href = '/products';
                    } else {
                        const err = await response.json();
                        alert('Error: ' + (err.error || 'Failed to add product.'));
                    }
                } catch (error) {
                    console.error(error);
                    alert('Network error while saving product.');
                }
            });
        });
    </script>

    <script src="/js/component.js"></script>
</body>
</html>
