<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Product | Vendor</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/vendor.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="layout">
        <div data-component="sidebarVendor"></div>
        <main class="main">
            <div data-component="topbar"></div>
            <section class="content">
                <div class="add-product-content">
                    <div class="page-header">
                        <div class="header-left">
                            <a href="/products" class="back-link"><i class="bi bi-arrow-left"></i> Back to My Products</a>
                            <h2 class="page-title">EDIT PRODUCT</h2>
                        </div>
                    </div>
                    <div class="card form-card">
                        <form id="editProductForm">
                            <div class="form-grid">
                                <div class="form-column">
                                    <div class="form-group">
                                        <label>Product Name <span class="required">*</span></label>
                                        <input type="text" id="productName" required />
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>Price ($) <span class="required">*</span></label>
                                            <input type="number" id="productPrice" step="0.01" min="0" required />
                                        </div>
                                        <div class="form-group">
                                            <label>Stock Quantity <span class="required">*</span></label>
                                            <input type="number" id="productStock" min="0" required />
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Description</label>
                                        <textarea id="productDescription" rows="5"></textarea>
                                    </div>
                                </div>
                                <div class="form-column">
                                    <div class="form-group">
                                        <label>Update Product Image (Optional)</label>
                                        <input type="file" id="productImage" accept="image/*" />
                                    </div>
                                    <div class="image-preview-container">
                                        <div class="image-preview" id="imagePreview">
                                            <i class="bi bi-image"></i>
                                            <span>Loading...</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btn-cancel" onclick="window.location.href='/products'">CANCEL</button>
                                <button type="submit" class="btn-save"><i class="bi bi-check2"></i> UPDATE PRODUCT</button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Extract the product ID from the URL: /vendor/product/123/edit
            const pathParts = window.location.pathname.split('/');
            const productId = pathParts[3]; 

            const form = document.getElementById('editProductForm');
            const imageInput = document.getElementById('productImage');
            const imagePreview = document.getElementById('imagePreview');

            // 1. Fetch existing product data
            try {
                const res = await fetch(`/api/vendor/product/details/${productId}`);
                if (res.ok) {
                    const product = await res.json();
                    document.getElementById('productName').value = product.name;
                    document.getElementById('productPrice').value = product.price;
                    document.getElementById('productStock').value = product.stock;
                    document.getElementById('productDescription').value = product.description || '';
                    
                    if (product.image_url) {
                        imagePreview.innerHTML = `<img src="${product.image_url}" style="width:100%; height:100%; object-fit:cover; border-radius:10px;">`;
                    } else {
                        imagePreview.innerHTML = `<i class="bi bi-image"></i><span>No Image Uploaded</span>`;
                    }
                } else {
                    alert('Failed to load product details.');
                    window.location.href = '/products';
                }
            } catch (error) {
                console.error(error);
                alert('Network error loading product.');
            }

            // 2. Live image preview for new uploads
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    imagePreview.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover; border-radius:10px;">`;
                }
            });
            // 3. Submit updates
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const formData = new FormData();
                formData.append('name', document.getElementById('productName').value);
                formData.append('price', document.getElementById('productPrice').value);
                formData.append('stock', document.getElementById('productStock').value);
                formData.append('description', document.getElementById('productDescription').value);
                
                if (imageInput.files[0]) {
                    formData.append('productImage', imageInput.files[0]);
                }
                try {
                    const response = await fetch(`/api/vendor/product/${productId}`, {
                        method: 'PUT',
                        body: formData
                    });

                    if (response.ok) {
                        alert('Product updated successfully!');
                        window.location.href = '/products';
                    } else {
                        alert('Error updating product.');
                    }
                } catch (error) {
                    console.error(error);
                    alert('Network error.');
                }
            });
        });
    </script>
    <script src="/js/component.js"></script>
</body>
</html>
