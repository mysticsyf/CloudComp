<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoEquip | Welcome</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="layout">
        <div data-component="sidebarVendor"></div>
        <div class="right-side">
            <div data-component="topbar"></div>
            <main class="main">
                <div class="page-header">
                    <h1>My Profile</h1>
                    <p>Manage your personal information and account settings.</p>
                </div>

                <div class="profile-container">

                    <!-- Profile Card -->
                    <section class="profile-card">

                        <div class="profile-avatar">
                            <img src="/images/default-avatar.png" alt="Profile Picture" id="profileImage">
                            <button class="btn-secondary" id="changePhotoBtn">Change Photo</button>
                        </div>

                        <div class="profile-summary">
                            <h2 id="profileUsername">Username</h2>
                            <span class="role-badge" id="profileRole">Vendor</span>
                            <p id="memberSince">Member since: June 2026</p>
                        </div>

                    </section>

                    <!-- Personal Information -->
                    <section class="content-card">

                        <div class="card-header">
                            <h2>Personal Information</h2>
                        </div>

                        <div class="form-grid">

                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="username">
                            </div>

                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="email">
                            </div>

                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="text" id="phone">
                            </div>

                            <div class="form-group">
                                <label>Role</label>
                                <input type="text" id="role" readonly>
                            </div>

                        </div>

                        <div class="card-actions">
                            <button class="btn-primary" id="saveChangesBtn">Save Changes</button>
                        </div>

                    </section>

                    <!-- Change Password -->
                    <section class="content-card">

                        <div class="card-header">
                            <h2>Security</h2>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" id="currentPassword">
                            </div>

                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="newPassword">
                            </div>

                            <div class="form-group">
                                <label>Confirm New Password</label>
                                <input type="password" id="confirmPassword">
                            </div>

                        </div>

                        <div class="card-actions">
                            <button class="btn-primary" id="changePasswordBtn">
                                Change Password
                            </button>
                        </div>

                    </section>

                    <!-- Vendor Only -->
                    <section class="content-card vendor-section">

                        <div class="card-header">
                            <h2>Store Information</h2>
                        </div>

                        <div class="form-grid">

                            <div class="form-group">
                                <label>Store Name</label>
                                <input type="text">
                            </div>

                            <div class="form-group">
                                <label>Business Registration No.</label>
                                <input type="text">
                            </div>

                            <div class="form-group full-width">
                                <label>Store Description</label>
                                <textarea rows="4"></textarea>
                            </div>

                        </div>

                        <div class="card-actions">
                            <button class="btn-primary">Save Store Information</button>
                        </div>

                    </section>

                    <!-- Buyer Only -->
                    <section class="content-card buyer-section">

                        <div class="card-header">
                            <h2>Shipping Address</h2>
                        </div>

                        <!-- Add new address -->
                        <div class="form-grid">

                            <div class="form-group full-width">
                                <label>New Address</label>
                                <textarea rows="3" id="newAddress"></textarea>
                            </div>

                        </div>

                        <div class="card-actions">
                            <button class="btn-primary" id="addAddressBtn">
                                Add Address
                            </button>
                        </div>

                        <!-- Address list -->
                        <div id="addressList"></div>

                    </section>
                    <div class="modal" id="avatarModal">
                        <div class="modal-content">
                            <h2>Change Profile Picture</h2>
                            <input
                                type="file"
                                id="avatarInput"
                                accept="image/*"
                            >
                            <div class="modal-buttons">
                                <button id="uploadAvatarBtn" class="btn-primary">Upload</button>
                                <button id="cancelAvatarBtn" class="btn-secondary">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="/js/component.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
