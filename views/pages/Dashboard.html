<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoEquip | Welcome</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="layout">
        <div data-component="sidebar"></div>
        <div class="right-side">
            <div data-component="topbar"></div>
            <main class="main">
                <!-- Search -->
                <section class="search-section">
                    <div class="searchbar">
                        <input type="text" placeholder="Search products...">
                        <button>
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </section>

                <!-- Promotional Banner -->
                <section class="banner-section">
                    <div class="banner-slider">
                        <!-- Banner images -->
                    </div>
                </section>

                <!-- Featured Products -->
                <section class="featured-section">
                    <div class="section-header">
                        <h2>Featured Products</h2>
                        <a href="/products">View All</a>
                    </div>

                    <div class="item-slider" id="featuredProducts">
                        <div class="product-card">
                            <div class="product-image">
                                <img src="/images/products/brake-pad.jpg" alt="Brake Pad">
                            </div>

                            <div class="product-content">

                                <span class="product-category">
                                    Brake System
                                </span>

                                <h3 class="product-title">
                                    Premium Brake Pad
                                </h3>

                                <div class="product-rating">
                                    ⭐⭐⭐⭐⭐
                                    <span>4.8</span>
                                </div>

                                <p class="product-price">
                                    RM 129.00
                                </p>

                                <button class="add-cart-btn">
                                    <i class="bi bi-cart-plus"></i>
                                    Add to Cart
                                </button>

                            </div>

                        </div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                    </div>
                </section>

                <!-- All Products -->
                <section class="products-section">
                    <div class="section-header">
                        <h2>All Products</h2>
                    </div>

                    <div class="item-container" id="productGrid">
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                        <div data-component="productCard" data-product-id="2"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script src="/js/component.js"></script>
</body>
</html>
